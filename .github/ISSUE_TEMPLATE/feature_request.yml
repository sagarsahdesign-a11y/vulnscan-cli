name: Feature Request
description: Suggest an enhancement or new feature for cvemap
title: "[Feature]: "
labels: ["enhancement"]
assignees: ["sagarsahdesign-a11y"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible to help us evaluate it.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched existing issues/PRs and this feature has not been requested before
          required: true
        - label: This feature aligns with cvemap's goal of being a CLI-first network vulnerability scanner
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - Scanning (new scan types, protocols)
        - CVE / Vulnerability Intelligence (new data sources)
        - Reporting (new output formats or visualizations)
        - CLI / UX (usability improvements)
        - Performance / Speed
        - Integrations (SIEM, ticketing, etc.)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who would benefit?
      placeholder: "As a SOC analyst, I need... because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature. Include CLI flags, output format, or behavior examples.
      placeholder: |
        Add a `--format sarif` flag that exports results in SARIF format,
        allowing integration with GitHub Code Scanning.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: Are you willing to submit a PR for this feature?
      options:
        - "Yes — I can implement this"
        - "Yes — but I need guidance"
        - "No — just suggesting"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links to related tools, papers, CVEs, or screenshots.
