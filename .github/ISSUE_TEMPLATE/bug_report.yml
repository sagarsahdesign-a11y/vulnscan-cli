name: Bug Report
description: Report a bug or unexpected behavior in cvemap
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: ["sagarsahdesign-a11y"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest version of cvemap (`pip install --upgrade cvemap`)
          required: true
        - label: I have read the [README](https://github.com/sagarsahdesign-a11y/cvemap#readme)
          required: true

  - type: input
    id: cvemap-version
    attributes:
      label: cvemap Version
      placeholder: "e.g., 1.0.0"
      description: "Run `cvemap version` to get this"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g., 3.11.4"
      description: "Run `python --version`"
    validations:
      required: true

  - type: input
    id: nmap-version
    attributes:
      label: Nmap Version
      placeholder: "e.g., 7.94"
      description: "Run `nmap --version`"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Debian/Ubuntu)
        - Linux (RHEL/CentOS/Fedora)
        - Linux (Arch)
        - macOS
        - Windows 10
        - Windows 11
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I run `cvemap scan -t ...`, ..."
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command Used
      description: The exact command you ran (redact any IPs/hostnames if needed)
      render: shell
      placeholder: "cvemap scan -t 192.168.x.x -p 1-1000"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Paste the full error output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might help.
